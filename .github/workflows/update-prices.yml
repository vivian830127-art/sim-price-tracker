name: 每日更新市售價

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00 = 台北時間 10:00
  workflow_dispatch: {}    # 也可以手動觸發
  push:
    paths:
      - "config/PChome售價試算.xlsx"   # 一更新 Excel 就立即重算

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: |
          pip install openpyxl playwright
          playwright install chromium --with-deps

      - name: Excel 轉設定檔
        run: python scraper/excel_to_config.py

      - name: 抓取 Fastmove 浮動報價
        env:
          FM_USER: ${{ secrets.FM_USER }}
          FM_PASS: ${{ secrets.FM_PASS }}
        run: python scraper/fetch_quotes.py
        continue-on-error: true   # Fastmove 抓不到時仍繼續(沿用前次報價)

      - name: 抓取 PChome 即時售價
        run: python scraper/fetch_prices.py

      - name: 提交更新後的資料
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ config/products.json
          git diff --cached --quiet || git commit -m "更新售價資料 $(date +'%Y-%m-%d')"
          git push
