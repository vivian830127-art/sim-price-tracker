name: 每日更新市售價

concurrency:
  group: update-prices
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    paths:
      - "config/PChome售價試算.xlsx"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl playwright
          playwright install chromium --with-deps

      - name: Excel 轉設定檔
        run: python scraper/excel_to_config.py

      - name: 抓取 Fastmove 浮動報價
        env:
          FM_USER: ${{ secrets.FM_USER }}
          FM_PASS: ${{ secrets.FM_PASS }}
        run: python scraper/fetch_quotes.py
        continue-on-error: true

      - name: 抓取 PChome 即時售價
        run: python scraper/fetch_prices.py

      - name: Commit & Push
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"

          git add data/ config/products.json

          # 若沒有任何變更，直接結束
          if git diff --cached --quiet; then
            echo "沒有資料更新"
            exit 0
          fi

          git commit -m "更新售價資料 $(TZ=Asia/Taipei date +'%Y-%m-%d')"

          # 同步遠端最新版本
          git pull --rebase origin main

          # 推送
          git push origin main
